name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]
    branches: [main]

jobs:
  pinnedactions:
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}
    uses: ./.github/workflows/pinned-actions.yml

  docupdate:
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}
    uses: ./.github/workflows/doc-update.yml

  format:
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}
    uses: ./.github/workflows/format.yml

  dogfood:
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}
    uses: ./.github/workflows/dogfood.yml

  sonarcloud:
    uses: ./.github/workflows/sonarcloud.yml
    secrets:
      sonar-auth-token: ${{ secrets.SONAR_TOKEN }}

  performance:
    uses: ./.github/workflows/performance.yml

  detect-custom-tag:
    if: ${{ github.event_name == 'push' }}
    uses: ./.github/workflows/detect-custom-tag.yml

  tagversion:
    needs: [detect-custom-tag]
    uses: ./.github/workflows/tagversion.yml
    with:
      custom_tag: ${{ github.event_name == 'push' && needs.detect-custom-tag.outputs.custom_tag || '' }}

  build:
    needs: tagversion
    uses: ./.github/workflows/dotnetcore.yml
    with:
      new_tag: ${{ needs.tagversion.outputs.new_tag }}
      new_version: ${{ needs.tagversion.outputs.new_version }}
      
